version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: inventory_db
    restart: always
    environment:
      MARIADB_DATABASE: inventory_db
      MARIADB_USER: vlad
      MARIADB_PASSWORD: qwerty
      MARIADB_ROOT_PASSWORD: root_secure_password
    volumes:
      - ./mariadb_data:/var/lib/mysql
    networks:
      - inventory_network

  web:
    build: .
    container_name: inventory_app
    restart: always
    environment:
      DATABASE_URL: "mysql://vlad:qwerty@db:3306/inventory_db"
    depends_on:
      - db
    networks:
      - inventory_network

  nginx:
    image: nginx:alpine
    container_name: inventory_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - inventory_network

networks:
  inventory_network:
    driver: bridge